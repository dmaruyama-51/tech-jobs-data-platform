name: Terraform Apply to Production

on:
  push:
    branches: [ main, feature/#27 ]

permissions:
  contents: read
  id-token: write  # Workload Identity Federation用の権限

jobs:
  terraform-apply:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_PROD }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_PROD }}
          
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'
      
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"
      
      - name: Terraform Plan
        working-directory: ./terraform
        run: |
          terraform plan -lock=false \
            -var="project_id=${PROJECT_ID_PROD}" \
            -var="region=${REGION}"
      
      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform apply -lock=false \
            -var="project_id=${{ env.PROJECT_ID_PROD }}" \
            -var="region=${{ env.REGION }}"
